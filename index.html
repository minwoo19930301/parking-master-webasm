<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"name=viewport><title>Parking Master WebASM</title><style>:root{color-scheme:dark;--bg:#0c1220;--panel:rgba(10, 14, 28, 0.78);--line:rgba(255, 255, 255, 0.08);--accent:#56f0a4;--text:#f6f8ff;--muted:rgba(246, 248, 255, 0.7)}*{box-sizing:border-box}body,html{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at top,rgba(76,132,255,.25),transparent 44%),linear-gradient(180deg,#101931 0,#090d18 100%);font-family:"SF Pro Display","Segoe UI",sans-serif;color:var(--text)}body{display:grid;place-items:stretch}#app{position:relative;width:100vw;height:100vh}#canvas{width:100%;height:100%;display:block;outline:0;touch-action:none}#loading{position:absolute;inset:auto 16px max(16px,env(safe-area-inset-bottom)) 16px;padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:var(--panel);backdrop-filter:blur(12px);font-size:14px;letter-spacing:.02em;color:var(--muted);pointer-events:none}#loading strong{color:var(--accent)}</style></head><body><div id=app><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas><div id=loading><strong>Loading</strong> web assembly bundle...</div></div><script>const loading=document.getElementById("loading"),canvas=document.getElementById("canvas");function resizeCanvas(){canvas.style.width=`${window.innerWidth}px`,canvas.style.height=`${window.innerHeight}px`}resizeCanvas(),window.addEventListener("resize",resizeCanvas);var Module={canvas:canvas,setStatus(n){if(!n)return loading.textContent="Tap the screen and drive.",void window.setTimeout((()=>{loading.style.opacity="0"}),1200);loading.innerHTML=`<strong>Status</strong> ${n}`},monitorRunDependencies(n){loading.innerHTML=n>0?`<strong>Loading</strong> ${n} file${n>1?"s":""} left`:"<strong>Ready</strong> tap the screen and drive."}}</script><script async src=index.js></script></body></html>
