<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Parking Master WebASM</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1220;
        --panel: rgba(10, 14, 28, 0.78);
        --line: rgba(255, 255, 255, 0.08);
        --accent: #56f0a4;
        --text: #f6f8ff;
        --muted: rgba(246, 248, 255, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(76, 132, 255, 0.25), transparent 44%),
          linear-gradient(180deg, #101931 0%, #090d18 100%);
        font-family: "SF Pro Display", "Segoe UI", sans-serif;
        color: var(--text);
      }

      body {
        display: grid;
        place-items: stretch;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        touch-action: none;
      }

      #loading {
        position: absolute;
        inset: auto 16px max(16px, env(safe-area-inset-bottom)) 16px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        font-size: 14px;
        letter-spacing: 0.02em;
        color: var(--muted);
        pointer-events: none;
      }

      #loading strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
      <div id="loading"><strong>Loading</strong> web assembly bundle...</div>
    </div>
    <script>
      const loading = document.getElementById("loading");
      const canvas = document.getElementById("canvas");

      function resizeCanvas() {
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      var Module = {
        canvas,
        setStatus(text) {
          if (!text) {
            loading.textContent = "Tap the screen and drive.";
            window.setTimeout(() => {
              loading.style.opacity = "0";
            }, 1200);
            return;
          }
          loading.innerHTML = `<strong>Status</strong> ${text}`;
        },
        monitorRunDependencies(left) {
          if (left > 0) {
            loading.innerHTML = `<strong>Loading</strong> ${left} file${left > 1 ? "s" : ""} left`;
          } else {
            loading.innerHTML = "<strong>Ready</strong> tap the screen and drive.";
          }
        }
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
